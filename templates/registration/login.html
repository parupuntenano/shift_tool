{% extends 'shifts/base.html' %}

{% block title %}
  ログイン | ShiftFlow
{% endblock %}

{% block content %}

  <div class="login-card">
    <div class="login-brand">
      <span>
        <i class="bi bi-calendar2-check">
        </i>
      </span>
      <h1>ShiftFlow</h1>
      <p>汎用シフト自動作成システム</p>
    </div>

    {% if form.errors %}
      <div class="alert alert-danger">ログインIDまたはパスワードが違います。</div>
    {% endif %}

    <form method="post">{% csrf_token %}<div class="mb-3">
      <label class="form-label">ログインID</label>
      <input class="form-control form-control-lg" type="text" name="username" autofocus required>
    </div>
      <div class="mb-4">
        <label class="form-label">パスワード</label>
        <input class="form-control form-control-lg" type="password" name="password" required>
      </div>
      <button class="btn btn-primary btn-lg w-100">ログイン</button>
    </form>
  </div>

{% endblock %}
