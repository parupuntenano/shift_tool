{% load static %}
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Shift Tool V2{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'shift_core/app.css' %}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{% url 'dashboard' %}">Shift Tool V2</a>
    <nav>
      {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}">ダッシュボード</a>
        <a href="{% url 'import_data' %}">Excel取込</a>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit">ログアウト</button>
        </form>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% for message in messages %}
      <div class="message {{ message.tags }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
