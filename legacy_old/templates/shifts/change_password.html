{% extends 'shifts/base.html' %}

{% block title %}
  パスワード変更 | ShiftFlow
{% endblock %}

{% block content %}

  <header class="page-header">
    <div>
      <span class="kicker">ACCOUNT</span>
      <h1>パスワード変更</h1>
      <p>現在のパスワードを確認して、新しいパスワードへ変更します。</p>
    </div>
  </header>
  <div class="content-grid">
    <section class="panel form-panel">
      <h2>新しいパスワードを設定</h2>
      <form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary w-100">
        <i class="bi bi-key"></i> パスワードを変更する</button>
      </form>
    </section>
    <aside class="panel">
      <h2>ログイン情報</h2>
      <p>ログインIDは <strong>{{ user.username }}</strong> です。</p>
      <p class="text-muted">変更後もログイン状態は維持されます。次回から新しいパスワードを使用してください。</p>
    </aside>
  </div>

{% endblock %}
